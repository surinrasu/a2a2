min_version = "2024.1.1"

[env]
_.path = ["./target/debug", "./target/release"]
CARGO_TERM_COLOR = "always"
RUST_BACKTRACE = "1"

[tools]
rust = { version = "latest", components = "cargo,rust-analyzer,rustfmt,clippy", targets = "aarch64-unknown-linux-gnu" }

[task_config]
dir = "{{config_root}}"
includes = [".mise/tasks/*.toml"]
